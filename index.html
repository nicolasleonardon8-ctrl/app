<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.header {
  background: linear-gradient(90deg, #00ffcc, #0077ff);
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 30px;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,255,200,0.3);
}

button {
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  color: black;
  font-size: 16px;
  font-weight: bold;
  width: 80%;
  margin-top: 10px;
}

button:hover {
  background: #00ccaa;
}
</style>
</head>

<body>

<div class="header">
🚀 MEU APP
</div>

<div class="container">

<div class="card">
<h2>Função 1</h2>
<p>Clique no botão abaixo</p>
<button onclick="alert('Funcionando!')">ATIVAR</button>
</div>

<div class="card">
<h2>Função 2</h2>
<p>Outra função do app</p>
<button onclick="alert('Outra função ativa!')">USAR</button>
</div>

</div>

</body>
</html>
